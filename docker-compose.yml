version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      POKER_ENV: container
      POKER_HOST: "0.0.0.0"
      POKER_PORT: "5000"
      POKER_CONFIG_PATH: /config/house_rules.json
      POKER_DB_PATH: /data/poker.db
      POKER_LOG_LEVEL: INFO
      POKER_CORS_ORIGINS: "*"
    volumes:
      - ./config:/config
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:5000
      VITE_WS_URL: http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  poker_data:
    driver: local
